name: Еженедельная проверка студенческих работ

on:
  schedule:
    # Каждую среду в 00:15 по Кемерово (UTC+7)
    - cron: '27 18 22 4 *'   # UTC 17:15 = Кемерово 00:15 (след. дня, т.к. UTC+7) 22 апреля
  workflow_dispatch:         # возможность ручного запуска

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-students:
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Установить MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Установить зависимости Python
        run: pip install regex

      - name: Получить список студенческих веток
        id: get_branches
        run: |
          # Получаем все удалённые ветки, фильтруем group1/, group2/, group3/
          $branches = git branch -r | Where-Object { $_ -match 'origin/(group[5-6]/[^/]+)$' } | ForEach-Object { $matches[1] }
          $branchList = $branches -join ','
          echo "branches=$branchList" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          echo "Всего веток: $($branches.Count)"
        shell: pwsh

      - name: Создать артефакт для провальных веток
        run: |
          New-Item -Path failed-branches.txt -ItemType File -Force
          Add-Content failed-branches.txt "Ветки без изменений или с ошибкой компиляции:`n"
        shell: pwsh

      - name: Обработка каждой ветки
        id: process_loop
        run: |
          $branches = "${{ steps.get_branches.outputs.branches }}" -split ','
          $total = $branches.Count
          $index = 0
          $failed = @()
          
          # Клонируем дополнительные скрипты из main-branch позже
          # Сначала получим main-branch скрипты (один раз)
          git clone --depth 1 --branch main https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }} main-branch-temp
          
          foreach ($branch in $branches) {
            $index++
            Write-Host "`n========================================"
            Write-Host "[$index/$total] Обработка ветки: $branch"
            Write-Host "========================================"
            
            # 1. Проверить, есть ли изменения относительно main
            git fetch origin $branch
            $diffStat = git diff --stat main...origin/$branch
            if (-not $diffStat) {
              Write-Host "⚠️ Ветка $branch не содержит изменений относительно main. Пропускаем."
              Add-Content failed-branches.txt "- $branch (нет изменений)"
              continue
            }
            
            # 2. Создать PR
            $prTitle = "$branch - Первичная проверка"
            $prBody = "Проведена первичная проверка стиля.`nПроведено первичное ИИ ревью.`nВнимательно изучите и внесите изменения.`n`nЕсли будут вопросы:`n1) Находите замечания, с которым не согласны (или есть сомнение/непонимание почему так).`n2) Тегаете преподавателя под замечанием через @ и пишете вопрос в комментарии.`n3) Скидываете ссылку на комментарий в чатик (можно сопроводить ссылку текстом) - преподаватель возьмет в работу.`n`nПожелание: делать изменения за один пуш-коммит - так удобнее проверять, что вы не проигнорировали ревью."
            
            # Создаём PR через gh
            $prNumber = gh pr create --title "$prTitle" --body "$prBody" --base main --head $branch --repo ${{ github.repository }} --token ${{ secrets.PAT_TOKEN }} 2>&1
            if ($LASTEXITCODE -ne 0) {
              Write-Host "❌ Не удалось создать PR для $branch. Ошибка: $prNumber"
              Add-Content failed-branches.txt "- $branch (не удалось создать PR)"
              continue
            }
            # Извлекаем номер PR из вывода
            $prNumber = $prNumber -replace '.*#(\d+).*', '$1'
            Write-Host "✅ PR #$prNumber создан"
            
            # 3. Клонируем код студента (ветка) для проверки
            git clone --depth 1 --branch $branch https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }} student-code
            cd student-code
            
            # 4. Копируем .editorconfig и Settings.StyleCop.json из временной папки main-branch
            Copy-Item -Path "../main-branch-temp/.editorconfig" -Destination "." -Force -ErrorAction SilentlyContinue
            New-Item -Path "ExpeditionPlanner" -ItemType Directory -Force
            Copy-Item -Path "../main-branch-temp/Settings.StyleCop.json" -Destination "ExpeditionPlanner/Settings.StyleCop.json" -Force -ErrorAction SilentlyContinue
            
            # 5. Конвертируем проект в SDK-style и добавляем StyleCop (если нужно)
            pwsh "../main-branch-temp/.github/scripts/convert_and_add_stylecop.ps1" -CsprojPath "ExpeditionPlanner/ExpeditionPlanner.csproj" -Workspace (Get-Location).Path
            
            # 6. Восстановить пакеты и собрать
            dotnet restore ExpeditionPlanner/ExpeditionPlanner.csproj
            $buildOutput = dotnet build ExpeditionPlanner/ExpeditionPlanner.csproj 2>&1
            $buildExitCode = $LASTEXITCODE
            
            if ($buildExitCode -ne 0) {
              Write-Host "❌ Сборка не удалась для $branch"
              # Меняем заголовок PR
              gh pr edit $prNumber --title "[НЕ КОМПИЛИРУЕТСЯ] $prTitle" --repo ${{ github.repository }} --token ${{ secrets.PAT_TOKEN }}
              # Добавляем комментарий с логом ошибки
              $errorLog = $buildOutput | Select-Object -Last 30 | Out-String
              $comment = "Сборка завершилась с ошибкой. Код: $buildExitCode`n`n````n$errorLog`n```"
              gh pr comment $prNumber --body "$comment" --repo ${{ github.repository }} --token ${{ secrets.PAT_TOKEN }}
              Add-Content "../../failed-branches.txt" "- $branch (ошибка компиляции)"
              cd ../..
              Remove-Item -Recurse -Force student-code
              continue
            }
            
            Write-Host "✅ Сборка успешна для $branch"
            
            # 7. Запуск стилевого анализа (как в manual-linterReview-pr-cashauto)
            # Сохраняем build.log
            $buildOutput | Out-File -FilePath build.log -Encoding utf8
            
            # dotnet format
            dotnet tool install -g dotnet-format
            dotnet format ExpeditionPlanner/ExpeditionPlanner.csproj style --verify-no-changes --severity info > ide_warnings.txt 2>&1
            
            # Объединяем логи
            Get-Content build.log > combined.log
            Add-Content combined.log "`n=== Предупреждения dotnet format ===`n"
            if (Test-Path ide_warnings.txt) {
              Get-Content ide_warnings.txt >> combined.log
            } else {
              Add-Content combined.log "Файл с предупреждениями IDE не найден."
            }
            
            # Преобразуем в JSON и создаём отчёт
            python "../main-branch-temp/.github/scripts/parse_log_to_json.py" --log-file combined.log --output-json warnings.json
            python "../main-branch-temp/.github/scripts/generate_report_from_json.py" --json-file warnings.json --output-txt stylecop_report.txt
            
            # Добавляем отчёт в комментарий к PR
            $reportContent = Get-Content stylecop_report.txt -Raw
            # Ограничиваем длину (GitHub ограничение ~65k)
            if ($reportContent.Length -gt 60000) {
              $reportContent = $reportContent.Substring(0, 60000) + "`n... (отчёт обрезан, полный в артефактах)"
            }
            $reportComment = "## Результаты статического анализа`n`n````n$reportContent`n```"
            gh pr comment $prNumber --body "$reportComment" --repo ${{ github.repository }} --token ${{ secrets.PAT_TOKEN }}
            
            # 8. Запуск Copilot review
            # Устанавливаем GitHub CLI и расширение
            gh extension install k1LoW/gh-copilot-review --force
            # Используем специальный токен для Copilot (если есть)
            echo "${{ secrets.COPILOT_GITHUB_TOKEN }}" | gh auth login --with-token
            # Запускаем ревью (без force, так как PR новый)
            gh copilot-review $prNumber --repo ${{ github.repository }} || Write-Host "⚠️ Copilot review не удался"
            
            # Очистка
            cd ../..
            Remove-Item -Recurse -Force student-code
            Write-Host "✅ Обработка ветки $branch завершена"
          }
          
          # Сохраняем список провальных веток
          Write-Host "`nСписок проблемных веток сохранён в failed-branches.txt"
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Загрузить артефакт с провальными ветками
        uses: actions/upload-artifact@v4
        with:
          name: failed-branches
          path: failed-branches.txt