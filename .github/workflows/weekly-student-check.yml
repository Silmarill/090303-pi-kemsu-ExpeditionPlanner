name: Еженедельная проверка работ

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-students:
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install regex

      - name: Process student branches
        run: |
          ./.github/scripts/process-student-branches.ps1 -PatToken "${{ secrets.PAT_TOKEN }}" -CopilotToken "${{ secrets.COPILOT_GITHUB_TOKEN }}" -Repository "${{ github.repository }}"
        shell: pwsh

      - name: Upload failed branches artifact
        uses: actions/upload-artifact@v4
        with:
          name: failed-branches
          path: failed-branches.txt
