name: Еженедельная проверка работ

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-students:
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install regex

      - name: Process student branches
        shell: pwsh
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          COPILOT_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKENNNN }}
          REPO: ${{ github.repository }}
        run: |
          $ErrorActionPreference = "Stop"
          $PatToken    = $env:PAT_TOKEN
          $CopilotToken = $env:COPILOT_TOKEN
          $Repository  = $env:REPO

          # Авторизация gh CLI
          $env:GH_TOKEN = $PatToken

          Write-Host "Starting student branches processing..."

          # Получаем список веток
          $branches = git branch -r |
              Where-Object { $_ -match 'origin/(group[5-6]/[^/]+)$' } |
              ForEach-Object { $matches[1] }
          Write-Host "Found branches: $($branches -join ', ')"

          $total = $branches.Count
          $index = 0

          # Клонируем main-branch (скрипты и конфиги)
          Write-Host "Cloning main branch (for scripts)..."
          git clone --depth 1 --branch main "https://x-access-token:$PatToken@github.com/$Repository" main-branch-temp

          $failedBranchesFile = "$env:GITHUB_WORKSPACE/failed-branches.txt"
          New-Item -Path $failedBranchesFile -ItemType File -Force | Out-Null
          Add-Content $failedBranchesFile "Ветки без изменений или с ошибкой компиляции:`n"

          foreach ($branch in $branches) {
              $index++
              Write-Host "`n========================================"
              Write-Host "[$index/$total] Processing branch: $branch"
              Write-Host "========================================"

              # Проверяем изменения относительно main
              git fetch origin $branch
              $diffStat = git diff --stat main...origin/$branch
              if (-not $diffStat) {
                  Write-Host "⚠️ Branch $branch has no changes compared to main. Skipping."
                  Add-Content $failedBranchesFile "- $branch (no changes)"
                  continue
              }

              # Создаём PR
              $prTitle = "$branch - Первичная проверка"
              $prBody = @"
          Проведена первичная проверка стиля.
          Проведено первичное ИИ ревью.
          Внимательно изучите и внесите изменения.

          Если будут вопросы:
          1) Находите замечания, с которым не согласны (или есть сомнение/непонимание почему так).
          2) Тегаете преподавателя под замечанием через @ и пишете вопрос в комментарии.
          3) Скидываете ссылку на комментарий в чатик (можно сопроводить ссылку текстом) - преподаватель возьмет в работу.

          Пожелание: делать изменения за один пуш-коммит - так удобнее проверять, что вы не проигнорировали ревью.
          "@

              $prResult = gh pr create --title "$prTitle" --body "$prBody" --base main --head $branch --repo $Repository 2>&1
              if ($LASTEXITCODE -ne 0) {
                  Write-Host "❌ Failed to create PR for $branch. Error: $prResult"
                  Add-Content $failedBranchesFile "- $branch (failed to create PR)"
                  continue
              }
              $prNumber = $prResult -replace '.*/pull/(\d+).*', '$1'
              Write-Host "✅ PR #$prNumber created"

              # Клонируем код студента
              Write-Host "Cloning student code from branch $branch ..."
              git clone --depth 1 --branch $branch "https://x-access-token:$PatToken@github.com/$Repository" student-code
              Push-Location student-code

              # Копируем конфиги из main
              Copy-Item -Path "../main-branch-temp/.editorconfig" -Destination "." -Force -ErrorAction SilentlyContinue
              New-Item -Path "ExpeditionPlanner" -ItemType Directory -Force | Out-Null
              Copy-Item -Path "../main-branch-temp/Settings.StyleCop.json" -Destination "ExpeditionPlanner/Settings.StyleCop.json" -Force -ErrorAction SilentlyContinue

              # Конвертируем проект и добавляем StyleCop
              Write-Host "Converting project to SDK style and adding StyleCop..."
              pwsh "../main-branch-temp/.github/scripts/convert_and_add_stylecop.ps1" `
                  -CsprojPath "ExpeditionPlanner/ExpeditionPlanner.csproj" `
                  -Workspace (Get-Location).Path

              # Сборка
              Write-Host "Restoring NuGet packages..."
              dotnet restore ExpeditionPlanner/ExpeditionPlanner.csproj
              Write-Host "Building project..."
              $buildOutput  = dotnet build ExpeditionPlanner/ExpeditionPlanner.csproj 2>&1
              $buildExitCode = $LASTEXITCODE

              if ($buildExitCode -ne 0) {
                  Write-Host "❌ Build failed for $branch"
                  gh pr edit $prNumber --title "$prTitle [BUILD FAILED]" --repo $Repository
                  $errorLog = ($buildOutput | Select-Object -Last 30) -join "`n"
                  $fence = '```'
                  $comment = "Build failed. Exit code: $buildExitCode`n`n$fence`n$errorLog`n$fence"
                  $commentFile = "$env:GITHUB_WORKSPACE/comment.txt"
                  $comment | Out-File -FilePath $commentFile -Encoding utf8
                  gh pr comment $prNumber --body-file $commentFile --repo $Repository
                  Remove-Item $commentFile
                  Add-Content $failedBranchesFile "- $branch (build failed)"
                  Pop-Location
                  Remove-Item -Recurse -Force student-code
                  continue
              }

              Write-Host "✅ Build successful for $branch"

              # Сохраняем лог сборки
              $buildOutput | Out-File -FilePath build.log -Encoding utf8

              # dotnet format
              Write-Host "Running dotnet format..."
              dotnet tool install -g dotnet-format
              dotnet format ExpeditionPlanner/ExpeditionPlanner.csproj style --verify-no-changes --severity info > ide_warnings.txt 2>&1

              # Объединяем логи
              Get-Content build.log > combined.log
              Add-Content combined.log "`n=== dotnet format warnings ===`n"
              if (Test-Path ide_warnings.txt) {
                  Get-Content ide_warnings.txt >> combined.log
              } else {
                  Add-Content combined.log "No IDE warnings found."
              }

              # Анализ стиля через Python-скрипты
              Write-Host "Running StyleCop analysis..."
              python "../main-branch-temp/.github/scripts/parse_log_to_json.py" --log-file combined.log --output-json warnings.json
              python "../main-branch-temp/.github/scripts/generate_report_from_json.py" --json-file warnings.json --output-txt stylecop_report.txt

              $reportContent = Get-Content stylecop_report.txt -Raw -ErrorAction SilentlyContinue
              if (-not $reportContent) { $reportContent = "Детальный отчёт недоступен." }
              if ($reportContent.Length -gt 50000) {
                  $reportContent = $reportContent.Substring(0, 50000) + "`n... (обрезано - см. артефакты в Actions)"
              }

              # Считаем количество предупреждений из warnings.json
              $warningCount = -1
              if (Test-Path "warnings.json") {
                  try {
                      $warningsJson = Get-Content "warnings.json" -Raw | ConvertFrom-Json
                      if ($warningsJson -is [System.Array]) {
                          $warningCount = $warningsJson.Count
                      } elseif ($warningsJson.warnings) {
                          $warningCount = $warningsJson.warnings.Count
                      } else {
                          $warningCount = ($warningsJson | Get-Member -MemberType NoteProperty).Count
                      }
                  } catch {
                      $warningCount = -1
                  }
              }

              $statusMessage = if ($warningCount -eq 0) {
                  "✅ Все автоматические проверки кода прошли успешно."
              } elseif ($warningCount -gt 0 -and $warningCount -le 5) {
                  "👍 В целом неплохо, хорошая работа! Пожалуйста, ознакомьтесь с небольшими предупреждениями выше."
              } elseif ($warningCount -gt 5) {
                  "⚠️ Требуется доработка. Ознакомьтесь с замечаниями и исправьте код."
              } else {
                  "❌ Не удалось получить количество предупреждений. Проверьте логи сборки вручную."
              }

              $warningLabel = if ($warningCount -eq -1) { "ошибка" } else { "$warningCount" }
              $fence = '```'
              $reportComment = "## Анализ качества кода`n`n**Найдено предупреждений: $warningLabel**`n`n$statusMessage`n`n<details><summary>📋 Полный отчёт</summary>`n`n$fence`n$reportContent`n$fence`n</details>"
              $reportFile = "$env:GITHUB_WORKSPACE/report.txt"
              $reportComment | Out-File -FilePath $reportFile -Encoding utf8
              gh pr comment $prNumber --body-file $reportFile --repo $Repository
              Remove-Item $reportFile

              # Copilot review
              #Write-Host "Running Copilot review..."
              #gh extension install k1LoW/gh-copilot-review --force
              #$env:GH_TOKEN = $CopilotToken
              #gh copilot-review $prNumber
              #if ($LASTEXITCODE -ne 0) { Write-Host "⚠️ Copilot review failed" }
              #$env:GH_TOKEN = $PatToken

              # Очистка
              Pop-Location
              Remove-Item -Recurse -Force student-code
              Write-Host "✅ Finished processing branch $branch"
          }

          Write-Host "`nProcessing complete. Failed branches saved to $failedBranchesFile"

      - name: Upload failed branches artifact
        uses: actions/upload-artifact@v4
        with:
          name: failed-branches
          path: failed-branches.txt
