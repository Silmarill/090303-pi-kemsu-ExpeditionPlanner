name: Еженедельная проверка работ

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-students:
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Установить MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Установить зависимости Python
        run: pip install regex

      - name: Получить список студенческих веток (сохранить в переменную)
        id: get_branches
        run: |
          $branches = git branch -r | Where-Object { $_ -match 'origin/(group[5-6]/[^/]+)$' } | ForEach-Object { $matches[1] }
          $branchList = $branches -join ','
          echo "branches=$branchList" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          echo "Всего веток: $($branches.Count)"
        shell: pwsh

      - name: Создать артефакт для провальных веток
        run: |
          New-Item -Path "$env:GITHUB_WORKSPACE/failed-branches.txt" -ItemType File -Force
          Add-Content "$env:GITHUB_WORKSPACE/failed-branches.txt" "Ветки без изменений или с ошибкой компиляции:`n"
        shell: pwsh

      - name: Запуск обработки студенческих веток
        run: |
          ./.github/scripts/process-student-branches.ps1 -PatToken "${{ secrets.PAT_TOKEN }}" -CopilotToken "${{ secrets.COPILOT_GITHUB_TOKEN }}" -Repository "${{ github.repository }}"
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Загрузить артефакт с провальными ветками
        uses: actions/upload-artifact@v4
        with:
          name: failed-branches
          path: failed-branches.txt