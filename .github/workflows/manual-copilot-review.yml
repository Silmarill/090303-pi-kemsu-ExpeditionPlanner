name: Manual Copilot Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull Request number to review'
        required: true
        type: number
      force:
        description: 'Force re-review (overwrites previous Copilot comment)'
        required: false
        default: true
        type: boolean

jobs:
  copilot-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.inputs.pr_number }}/head
          fetch-depth: 1

      - name: Install GitHub CLI and extension
        run: |
          gh extension install k1LoW/gh-copilot-review
        env:
          GH_TOKEN: ${{ secrets.PAT_FOR_COPILOT_REVIEW }}

      - name: Request Copilot review with debug
        run: |
          echo "=== GitHub CLI version ==="
          gh --version
          echo "=== Auth status ==="
          gh auth status
          echo "=== Copilot extension help ==="
          gh copilot-review --help
          echo "=== Requesting review for PR ${{ github.event.inputs.pr_number }} ==="
          gh copilot-review ${{ github.event.inputs.pr_number }} --force --debug 2>&1
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}