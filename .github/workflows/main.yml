name: Basic Code Quality Check

on:
  push:
    branches:
      - 'group4/**'
  pull_request:
    branches:
      - 'main'

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup MSBuild Path
        uses: warrenbuckley/Setup-MSBuild@v1

      - name: Restore NuGet Packages
        run: nuget restore YourSolution.sln

      - name: Build Project
        run: msbuild YourProject.csproj /property:Configuration=Release

      - name: Run StyleCop Analysis
        run: dotnet tool install --global dotnet-stylecop && dotnet stylecop .

      - name: Create Report
        run: echo "::set-output name=report::$(dotnet stylecop --format json)"

      - name: Comment on Pull Request
        if: github.event_name == 'pull_request'
        uses: tholladay/create-pull-request-comment@v2
        with:
          comment: '${{ steps.create-report.outputs.report }}'
          token: ${{ secrets.GITHUB_TOKEN }}
