name: Basic Code Quality Check

on:
  #push:
  #  branches:
     # - 'group4/**'
  pull_request:
    branches:
      - 'main'
      - 'group4/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: windows-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Restore NuGet Packages
        run: nuget restore ExpeditionPlanner.slnx

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install regex

      - name: Build Project and Capture Output
        run: dotnet build ExpeditionPlanner/ExpeditionPlanner.csproj > build.log

      - name: Parse Log to JSON (Step 1)
        run: |
          python "${{ github.workspace }}/.github/scripts/parse_log_to_json.py" "--log-file" "${{ github.workspace }}/build.log" "--output-json" "${{ github.workspace }}/warnings.json"

      - name: Generate Human-Readable Report (Step 2)
        run: |
          python "${{ github.workspace }}/.github/scripts/generate_report_from_json.py" --json-file "${{ github.workspace }}/warnings.json" --output-txt "${{ github.workspace }}/stylecop_report.txt"

      - name: Get current date and time
        id: date
        run: |
          $date = (Get-Date -Format "yyyy-MM-dd-HHmm")
          echo "date=$date" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        shell: pwsh

      - name: Prepare artifact name
        id: artifact_name
        run: |
          $repoName = "${{ github.event.repository.name }}"
          $branch = "${{ github.ref_name }}" -replace '/', '-'
          $actor = "${{ github.actor }}"
          $runNumber = "${{ github.run_number }}"
          $shaShort = "${{ github.sha }}"[0..3] -join ''
          $date = "${{ steps.date.outputs.date }}"
          $artifactName = "${repoName}_${branch}_${actor}_${date}_${runNumber}-${shaShort}"
          echo "name=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        shell: pwsh

      - name: Archive Reports
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.name }}
          path: |
            build.log
            warnings.json
            stylecop_report.txt

      - name: Analyze warnings and comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const warningsPath = process.env.GITHUB_WORKSPACE + '/warnings.json';
            let warningCount = 0;

            if (fs.existsSync(warningsPath)) {
              try {
                const data = JSON.parse(fs.readFileSync(warningsPath, 'utf8'));
                if (Array.isArray(data)) {
                  warningCount = data.length;
                } else if (data.warnings && Array.isArray(data.warnings)) {
                  warningCount = data.warnings.length;
                } else {
                  warningCount = Object.keys(data).length;
                }
              } catch (e) {
                console.log('JSON parse error:', e.message);
                warningCount = -1;
              }
            }

            let message = '';
            if (warningCount === 0) {
              message = '✅ All automatic code review checks passed successfully.';
            } else if (warningCount > 0 && warningCount <= 5) {
              message = '👍 Overall decent, good job! Please review the minor warnings above.';
            } else if (warningCount > 5) {
              message = '⚠️ More work needed. Review the comments above, close this pull request and go fix your code.';
            } else {
              message = '❌ Could not retrieve warning count. Check the build logs manually.';
            }

            const reportPath = process.env.GITHUB_WORKSPACE + '/stylecop_report.txt';
            let fullReport = 'No detailed report available.';
            if (fs.existsSync(reportPath)) {
              fullReport = fs.readFileSync(reportPath, 'utf8');
            }
            const truncatedReport = fullReport.length > 5000 ? fullReport.substring(0, 5000) + '\n... (truncated)' : fullReport;
            const commentBody = `## StyleCop Analysis\n\n**Warnings found: ${warningCount === -1 ? 'error' : warningCount}**\n\n${message}\n\n<details><summary>📋 Full report</summary>\n\n\`\`\`\n${truncatedReport}\n\`\`\`\n</details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });