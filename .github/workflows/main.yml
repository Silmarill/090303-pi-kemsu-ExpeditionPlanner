name: Basic Code Quality Check

on:
  push:
    branches:
      - 'group4/**'
  pull_request:
    branches:
      - 'main'

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3        

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Restore NuGet Packages
        run: nuget restore ExpeditionPlanner.slnx

      - name: Build Project and Capture Output
        run: dotnet build ExpeditionPlanner/ExpeditionPlanner.csproj > build.log

      - name: Parse Build Log and Generate JSON Report
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          & "${{ github.workspace }}/.github/scripts/Parse-BuildLog.ps1" `
            -LogFilePath "${{ github.workspace }}/build.log" `
            -OutputFilePath "${{ github.workspace }}/stylecop_report.txt"

      - name: Archive Reports
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ github.run_number }}-${{ github.sha }}
          path: |
            build.log
            stylecop_report.json

      - name: Comment on Pull Request
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-pull-request@v8
        with:
          title: 'Code Review Summary'
          body: '${{ steps.create-report.outputs.report }}'
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: true
          commit-message: 'Automated Code Review Comments'
          branch: 'code-review-comments'
          delete-branch: true
