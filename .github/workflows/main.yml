name: Basic Code Quality Check

on:
  push:
    branches:
      - 'group4/**'
  pull_request:
    branches:
      - 'main'

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3        

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Restore NuGet Packages
        run: nuget restore ExpeditionPlanner.slnx


      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install regex

      - name: Build Project and Capture Output
        run: dotnet build ExpeditionPlanner/ExpeditionPlanner.csproj > build.log

      - name: Parse Log to JSON (Step 1)
        run: |
          python "${{ github.workspace }}/.github/scripts/parse_log_to_json.py" "--log-file" "${{ github.workspace }}/build.log" "--output-json" "${{ github.workspace }}/warnings.json"

      - name: Generate Human-Readable Report (Step 2)
        run: |
          python "${{ github.workspace }}/.github/scripts/generate_report_from_json.py" --json-file "${{ github.workspace }}/warnings.json" --output-txt "${{ github.workspace }}/stylecop_report.txt"

      - name: Get current date and time
        id: date
        run: |
          $date = (Get-Date -Format "yyyy-MM-dd_HHmm")
          echo "date=$date" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        shell: pwsh

      - name: Prepare artifact name
        id: artifact_name
        run: |
          $repoName = "${{ github.event.repository.name }}"
          $branch = "${{ github.ref_name }}" -replace '/', '_'
          $actor = "${{ github.actor }}"
          $runNumber = "${{ github.run_number }}"
          $shaShort = "${{ github.sha }}"[0..6] -join ''
          $date = "${{ steps.date.outputs.date }}"
          $artifactName = "${repoName}_${branch}_${actor}_${date}_${runNumber}_${shaShort}"
          echo "name=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        shell: pwsh

      - name: Archive Reports
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.name }}
          path: |
            build.log
            warnings.json
            stylecop_report.txt

      - name: Comment on Pull Request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = '${{ github.workspace }}/stylecop_report.txt';
            let reportContent = fs.readFileSync(reportPath, 'utf8');
            if (reportContent.length > 60000) {
              reportContent = reportContent.substring(0, 60000) + '\n... (truncated)';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## StyleCop Analysis Report\n\`\`\`\n${reportContent}\n\`\`\``
            }););