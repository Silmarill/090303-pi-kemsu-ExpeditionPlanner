name: Базовый контроль качества кода

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Номер Pull Request для проверки (при ручном запуске)'
        required: true
        type: number

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: windows-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      # Определяем номер PR (только из ручного ввода)
      - name: Установить номер PR
        id: pr
        run: |
          $pr = "${{ github.event.inputs.pr_number }}"
          echo "number=$pr" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          echo "PR_NUMBER=$pr" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh

      - name: Получить код репозитория
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ steps.pr.outputs.number }}/head
          fetch-depth: 1

      - name: Установить MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Восстановить NuGet пакеты
        run: nuget restore ExpeditionPlanner.slnx

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Установить зависимости
        run: pip install regex

      # 1. Обычная сборка (лог содержит предупреждения компиляции и StyleCop)
      - name: Собрать проект и сохранить вывод
        run: dotnet build ExpeditionPlanner/ExpeditionPlanner.csproj > build.log

      # 2. Проверка IDE-правил (dotnet format) – отдельный лог
      - name: Проверить IDE форматирование (dotnet format)
        run: |
          dotnet tool install -g dotnet-format
          dotnet format ExpeditionPlanner/ExpeditionPlanner.csproj style --verify-no-changes --severity info > ide_warnings.txt 2>&1
          exit 0
        shell: pwsh

      # 3. Объединение двух логов в один (build.log + ide_warnings.txt)
      - name: Объединить логи
        run: |
          Get-Content build.log > combined.log
          Add-Content combined.log "`n=== Предупреждения dotnet format ===`n"
          if (Test-Path ide_warnings.txt) {
            Get-Content ide_warnings.txt >> combined.log
          } else {
            Add-Content combined.log "Файл с предупреждениями IDE не найден."
          }
        shell: pwsh

      # 4. Парсинг объединённого лога в JSON
      - name: Преобразовать лог в JSON
        run: |
          python "${{ github.workspace }}/.github/scripts/parse_log_to_json.py" `
            --log-file "${{ github.workspace }}/combined.log" `
            --output-json "${{ github.workspace }}/warnings.json"

      # 5. Генерация человеко-читаемого отчёта
      - name: Создать текстовый отчёт
        run: |
          python "${{ github.workspace }}/.github/scripts/generate_report_from_json.py" `
            --json-file "${{ github.workspace }}/warnings.json" `
            --output-txt "${{ github.workspace }}/stylecop_report.txt"

      # 6. Дата и имя артефакта
      - name: Получить текущую дату и время
        id: date
        run: |
          $date = (Get-Date -Format "yyyy-MM-dd-HHmm")
          echo "date=$date" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        shell: pwsh

      - name: Сформировать имя артефакта
        id: artifact_name
        run: |
          $repoName = "${{ github.event.repository.name }}"
          $branch = "${{ github.ref_name }}" -replace '/', '-'
          $actor = "${{ github.actor }}"
          $runNumber = "${{ github.run_number }}"
          $shaShort = "${{ github.sha }}"[0..3] -join ''
          $date = "${{ steps.date.outputs.date }}"
          $artifactName = "${repoName}_${branch}_${actor}_${date}_${runNumber}-${shaShort}"
          echo "name=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        shell: pwsh

      # 7. Архивация всех отчётов
      - name: Сохранить артефакты
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.name }}
          path: |
            build.log
            ide_warnings.txt
            combined.log
            warnings.json
            stylecop_report.txt

      # 8. Комментарий в PR (используем вычисленный номер PR)
      - name: Проанализировать предупреждения и оставить комментарий в PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const warningsPath = process.env.GITHUB_WORKSPACE + '/warnings.json';
            let warningCount = 0;

            if (fs.existsSync(warningsPath)) {
              try {
                const data = JSON.parse(fs.readFileSync(warningsPath, 'utf8'));
                if (Array.isArray(data)) {
                  warningCount = data.length;
                } else if (data.warnings && Array.isArray(data.warnings)) {
                  warningCount = data.warnings.length;
                } else {
                  warningCount = Object.keys(data).length;
                }
              } catch (e) {
                console.log('Ошибка парсинга JSON:', e.message);
                warningCount = -1;
              }
            }

            let message = '';
            if (warningCount === 0) {
              message = '✅ Все автоматические проверки кода прошли успешно.';
            } else if (warningCount > 0 && warningCount <= 5) {
              message = '👍 В целом неплохо, хорошая работа! Пожалуйста, ознакомьтесь с небольшими предупреждениями выше.';
            } else if (warningCount > 5) {
              message = '⚠️ Требуется доработка. Ознакомьтесь с замечаниями выше, закройте этот pull request и исправьте код.';
            } else {
              message = '❌ Не удалось получить количество предупреждений. Проверьте логи сборки вручную.';
            }

            const reportPath = process.env.GITHUB_WORKSPACE + '/stylecop_report.txt';
            let fullReport = 'Детальный отчёт недоступен.';
            if (fs.existsSync(reportPath)) {
              fullReport = fs.readFileSync(reportPath, 'utf8');
            }
            const truncatedReport = fullReport.length > 5000 ? fullReport.substring(0, 5000) + '\n... (обрезано)' : fullReport;
            const commentBody = `## Анализ качества кода\n\n**Найдено предупреждений: ${warningCount === -1 ? 'ошибка' : warningCount}**\n\n${message}\n\n<details><summary>📋 Полный отчёт</summary>\n\n\`\`\`\n${truncatedReport}\n\`\`\`\n</details>`;

            github.rest.issues.createComment({
              issue_number: ${{ steps.pr.outputs.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });