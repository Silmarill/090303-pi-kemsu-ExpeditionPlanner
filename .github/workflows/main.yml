name: Basic Code Quality Check

on:
  push:
    branches:
      - 'group4/**'
  pull_request:
    branches:
      - 'main'

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3        

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Restore NuGet Packages
        run: nuget restore ExpeditionPlanner.slnx


      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install regex

      - name: Build Project and Capture Output
        run: dotnet build ExpeditionPlanner/ExpeditionPlanner.csproj > build.log

      - name: Parse Log to JSON (Step 1)
        run: |
          python "${{ github.workspace }}/.github/scripts/parse_log_to_json.py" "--log-file" "${{ github.workspace }}/build.log" "--output-json" "${{ github.workspace }}/warnings.json"

      - name: Generate Human-Readable Report (Step 2)
        run: |
          python "${{ github.workspace }}/.github/scripts/generate_report_from_json.py" "--json-file" "${{ github.workspace }}/warnings.json" "--output-txt" "${{ github.workspace }}/stylecop_report.txt" "--repo-root" "${{ github.workspace }}"

      - name: Archive Reports
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ github.run_number }}-${{ github.sha }}
          path: |
            build.log
            warnings.json
            stylecop_report.txt

      - name: Comment on Pull Request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = '${{ github.workspace }}/stylecop_report.txt';
            let reportContent = fs.readFileSync(reportPath, 'utf8');
            // Обрезаем слишком длинный комментарий (максимум 65536 символов)
            if (reportContent.length > 60000) {
              reportContent = reportContent.substring(0, 60000) + '\n... (truncated)';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## StyleCop Analysis Report\n\`\`\`\n${reportContent}\n\`\`\``
            });